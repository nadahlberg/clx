{% extends "base.html" %}

{% block navbar %}{% endblock %}

{% block content %}
<div x-data="{
         documents: [],
         page: 1,
         hasNext: false,
         totalCount: null,
         countLoading: false,
         loading: true,
         textFilter: '',
         activeLabel: null,
         labels: [],
         labelDropdownOpen: false,
         _filterParams() {
             const p = new URLSearchParams();
             if (this.textFilter.trim()) p.set('text', this.textFilter.trim());
             return p.toString();
         },
         search() {
             this.page = 1;
             this.totalCount = null;
             this.fetchDocs();
         },
         fetchDocs() {
             this.loading = true;
             const params = this._filterParams();
             const qs = 'page=' + this.page + (params ? '&' + params : '');
             fetch('/api/projects/{{ project.id }}/docs?' + qs)
                 .then(r => r.json())
                 .then(data => {
                     this.documents = data.documents;
                     this.page = data.page;
                     this.hasNext = data.has_next;
                     this.loading = false;
                 })
                 .catch(() => { this.loading = false; });
         },
         fetchCount() {
             this.countLoading = true;
             const params = this._filterParams();
             fetch('/api/projects/{{ project.id }}/docs/count' + (params ? '?' + params : ''))
                 .then(r => r.json())
                 .then(data => {
                     this.totalCount = data.total_count;
                     this.countLoading = false;
                 })
                 .catch(() => { this.countLoading = false; });
         },
         fetchLabels() {
             fetch('/api/projects/{{ project.id }}/labels')
                 .then(r => r.json())
                 .then(data => {
                     this.labels = data.labels;
                     const active = data.active_label_id;
                     this.activeLabel = this.labels.find(l => l.id === active) || this.labels[0] || null;
                 });
         },
         switchLabel(label) {
             this.labelDropdownOpen = false;
             if (this.activeLabel && this.activeLabel.id === label.id) return;
             this.activeLabel = label;
             fetch('/api/projects/{{ project.id }}/labels/' + label.id + '/activate', { method: 'POST' });
         }
     }"
     x-init="fetchDocs(); fetchLabels()"
     class="flex-1 min-h-0">

    <!-- Three-column layout -->
    <div class="grid grid-cols-[280px_1fr_280px] h-full">
        <!-- Left sidebar -->
        <aside class="border-r border-border flex flex-col">
            <div class="h-12 shrink-0 border-b border-border flex items-center justify-between px-4">
                <span class="text-sm font-semibold text-gray-800">{{ project.name }}</span>
                <a href="/" class="text-gray-500 hover:text-gray-700 transition-colors" title="All Projects">
                    <i class="fas fa-layer-group"></i>
                </a>
            </div>
            <div class="p-4 scrollable-panel">
                <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">Filters</h3>
                <label class="block text-xs font-medium text-gray-500 mb-1">Text</label>
                <input type="text"
                       x-model="textFilter"
                       @keydown.enter="search()"
                       placeholder="Search text..."
                       class="w-full border border-border rounded-md px-2.5 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 mb-3">
                <button @click="search()"
                        class="w-full px-3 py-1.5 text-xs font-medium rounded-md bg-blue-600 text-white hover:bg-blue-700 transition-colors">
                    <i class="fas fa-search mr-1"></i> Search
                </button>
            </div>
        </aside>

        <!-- Center column -->
        <div class="flex flex-col min-h-0">
            <!-- Pinned doc count header -->
            <div class="h-10 border-b border-border flex items-center px-4 shrink-0">
                <span x-show="totalCount !== null" class="text-xs text-gray-600">
                    <span x-text="totalCount.toLocaleString()"></span> document<span x-show="totalCount !== 1">s</span>
                </span>
                <button x-show="totalCount === null && !countLoading"
                        @click="fetchCount()"
                        class="text-xs text-gray-500 hover:text-gray-700 transition-colors">
                    <i class="fas fa-calculator mr-1"></i> Get count
                </button>
                <span x-show="countLoading" class="text-xs text-gray-500">
                    <i class="fas fa-spinner fa-spin mr-1"></i> Counting...
                </span>
            </div>
            <!-- Scrollable document area -->
            <div class="flex-1 overflow-y-auto p-4">
                <!-- Loading state -->
                <div x-show="loading" class="flex items-center justify-center py-12">
                    <span class="text-sm text-gray-500">Loading...</span>
                </div>

                <!-- Document cards -->
                <div x-show="!loading" class="space-y-3">
                    <template x-for="doc in documents" :key="doc.id">
                        <div class="border border-border rounded-lg px-4 py-3 bg-surface hover:border-gray-300 transition-colors cursor-default">
                            <p class="text-sm text-gray-700" x-text="doc.text"></p>
                        </div>
                    </template>

                    <!-- Empty state -->
                    <div x-show="documents.length === 0" class="flex items-center justify-center py-12">
                        <span class="text-sm text-gray-500">No documents yet.</span>
                    </div>
                </div>

                <!-- Pagination -->
                <div x-show="page > 1 || hasNext" class="flex items-center justify-center gap-3 pt-4 pb-2">
                    <button @click="page--; fetchDocs()"
                            :disabled="page <= 1"
                            class="px-3 py-1.5 text-xs rounded-md border border-border transition-colors"
                            :class="page <= 1 ? 'text-gray-300 cursor-not-allowed' : 'text-gray-600 hover:border-gray-300 hover:bg-gray-50'">
                        <i class="fas fa-chevron-left mr-1"></i> Previous
                    </button>
                    <span class="text-xs text-gray-600">
                        Page <span x-text="page"></span>
                    </span>
                    <button @click="page++; fetchDocs()"
                            :disabled="!hasNext"
                            class="px-3 py-1.5 text-xs rounded-md border border-border transition-colors"
                            :class="!hasNext ? 'text-gray-300 cursor-not-allowed' : 'text-gray-600 hover:border-gray-300 hover:bg-gray-50'">
                        Next <i class="fas fa-chevron-right ml-1"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Right sidebar: Label panel -->
        <aside class="border-l border-border flex flex-col">
            <div class="h-12 shrink-0 border-b border-border flex items-center px-4 relative">
                <button @click="labelDropdownOpen = !labelDropdownOpen"
                        class="flex items-center gap-2 text-sm font-semibold text-gray-800 hover:text-gray-900 transition-colors w-full">
                    <i class="fas fa-tag text-gray-500 text-xs"></i>
                    <span x-text="activeLabel ? activeLabel.name : 'No label'" class="truncate"></span>
                    <i class="fas fa-chevron-down text-gray-400 text-xs ml-auto"></i>
                </button>
                <!-- Label dropdown -->
                <div x-show="labelDropdownOpen"
                     x-cloak
                     @click.outside="labelDropdownOpen = false"
                     class="absolute top-full left-0 right-0 bg-white border border-border rounded-b-lg shadow-lg z-10 max-h-60 overflow-y-auto">
                    <template x-for="label in labels" :key="label.id">
                        <button @click="switchLabel(label)"
                                class="w-full text-left px-4 py-2 text-sm hover:bg-gray-50 transition-colors flex items-center gap-2"
                                :class="activeLabel && activeLabel.id === label.id ? 'text-blue-600 font-medium' : 'text-gray-700'">
                            <i class="fas fa-check text-xs" :class="activeLabel && activeLabel.id === label.id ? 'text-blue-600' : 'invisible'"></i>
                            <span x-text="label.name"></span>
                        </button>
                    </template>
                </div>
            </div>
            <div class="p-4 scrollable-panel">
                <p class="text-sm text-gray-500">Select a document to view details.</p>
            </div>
        </aside>
    </div>
</div>
{% endblock %}
