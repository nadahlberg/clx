{% extends "base.html" %}

{% block navbar %}{% endblock %}

{% block content %}
<div class="flex-1 overflow-y-auto bg-slate-950" x-data="{ showModal: false, projectName: '' }">
    <div class="max-w-5xl mx-auto px-8 py-12">
        <div class="mb-10">
            <div class="flex items-center gap-3 mb-2">
                <span class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center text-white text-xs font-bold shadow-lg shadow-indigo-500/25">C</span>
                <h1 class="text-2xl font-bold text-white tracking-tight">CLX</h1>
            </div>
            <p class="text-sm text-slate-400 mt-3">Your classification projects</p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            {% for project in projects %}
            <a href="/projects/{{ project.id }}/"
               class="group block rounded-xl bg-slate-900 border border-slate-800 hover:border-indigo-500/50 hover:bg-slate-800/80 transition-all duration-200 p-5">
                <div class="flex items-center justify-between">
                    <h2 class="text-sm font-medium text-slate-200 group-hover:text-white transition-colors">{{ project.name }}</h2>
                    <i class="fas fa-arrow-right text-xs text-slate-600 group-hover:text-indigo-400 transition-colors"></i>
                </div>
            </a>
            {% endfor %}

            <!-- New Project Card -->
            <button @click="showModal = true"
                    class="group flex items-center justify-center rounded-xl border-2 border-dashed border-slate-700 p-5 text-slate-500 hover:text-indigo-400 hover:border-indigo-500/40 hover:bg-indigo-500/5 transition-all duration-200 cursor-pointer">
                <div class="text-center">
                    <div class="w-9 h-9 rounded-lg bg-slate-800 group-hover:bg-indigo-600/20 flex items-center justify-center mx-auto mb-2 transition-colors">
                        <i class="fas fa-plus text-sm"></i>
                    </div>
                    <p class="text-sm font-medium">New Project</p>
                </div>
            </button>
        </div>
    </div>

    <!-- New Project Modal -->
    <div x-show="showModal" x-cloak
         class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm"
         @keydown.escape.window="showModal = false"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0">
        <div class="bg-slate-900 rounded-2xl border border-slate-700 shadow-modal p-6 w-full max-w-md"
             @click.outside="showModal = false"
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 scale-95"
             x-transition:enter-end="opacity-100 scale-100">
            <h2 class="text-lg font-bold text-white mb-1">Create New Project</h2>
            <p class="text-sm text-slate-400 mb-5">Give your project a name to get started.</p>
            <form @submit.prevent="
                fetch('/api/projects/', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name: projectName})
                }).then(r => {
                    if (!r.ok) throw new Error('Failed to create project');
                    window.location.reload();
                }).catch(e => alert(e.message))
            ">
                <label for="project-name" class="block text-xs font-medium text-slate-400 mb-1.5">
                    Project Name
                </label>
                <input id="project-name"
                       type="text"
                       x-model="projectName"
                       required
                       class="w-full bg-slate-800 border border-slate-600 rounded-lg px-3.5 py-2.5 text-sm text-white focus:outline-none focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-500 transition-all placeholder:text-slate-500"
                       placeholder="Enter project name">
                <div class="flex justify-end gap-3 mt-5">
                    <button type="button"
                            @click="showModal = false"
                            class="px-4 py-2 text-sm font-medium text-slate-400 hover:text-slate-200 transition-colors">
                        Cancel
                    </button>
                    <button type="submit"
                            class="px-5 py-2 text-sm font-medium bg-indigo-600 text-white rounded-lg hover:bg-indigo-500 shadow-lg shadow-indigo-500/25 hover:shadow-indigo-500/40 transition-all">
                        Create Project
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
