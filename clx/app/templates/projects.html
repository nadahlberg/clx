{% extends "base.html" %}

{% block content %}
<div class="flex-1 overflow-y-auto" x-data="{ showModal: false, projectName: '' }">
    <div class="max-w-5xl mx-auto px-8 py-10">
        <div class="mb-10">
            <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Projects</h1>
            <p class="text-sm text-slate-500 mt-1">Manage your classification projects</p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
            {% for project in projects %}
            <a href="/projects/{{ project.id }}/"
               class="group block bg-white rounded-xl border border-slate-200/80 hover:border-indigo-300 hover:shadow-card transition-all duration-200 p-5">
                <div class="flex items-start justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-indigo-50 to-indigo-100 flex items-center justify-center text-indigo-500 group-hover:from-indigo-100 group-hover:to-indigo-200 transition-all duration-200">
                            <i class="fas fa-folder text-sm"></i>
                        </div>
                        <h2 class="text-sm font-semibold text-slate-800 group-hover:text-indigo-700 transition-colors">{{ project.name }}</h2>
                    </div>
                    <i class="fas fa-arrow-right text-xs text-slate-300 group-hover:text-indigo-400 transition-colors mt-1"></i>
                </div>
            </a>
            {% endfor %}

            <!-- New Project Card -->
            <button @click="showModal = true"
                    class="group flex items-center justify-center bg-white rounded-xl border-2 border-dashed border-slate-200 p-5 text-slate-400 hover:text-indigo-500 hover:border-indigo-300 hover:bg-indigo-50/30 transition-all duration-200 cursor-pointer">
                <div class="text-center">
                    <div class="w-9 h-9 rounded-lg bg-slate-100 group-hover:bg-indigo-100 flex items-center justify-center mx-auto mb-2 transition-colors">
                        <i class="fas fa-plus text-sm"></i>
                    </div>
                    <p class="text-sm font-medium">New Project</p>
                </div>
            </button>
        </div>
    </div>

    <!-- New Project Modal -->
    <div x-show="showModal" x-cloak
         class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm"
         @keydown.escape.window="showModal = false"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0">
        <div class="bg-white rounded-2xl shadow-modal p-6 w-full max-w-md"
             @click.outside="showModal = false"
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 scale-95"
             x-transition:enter-end="opacity-100 scale-100">
            <h2 class="text-lg font-bold text-slate-900 mb-1">Create New Project</h2>
            <p class="text-sm text-slate-500 mb-5">Give your project a name to get started.</p>
            <form @submit.prevent="
                fetch('/api/projects/', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name: projectName})
                }).then(r => {
                    if (!r.ok) throw new Error('Failed to create project');
                    window.location.reload();
                }).catch(e => alert(e.message))
            ">
                <label for="project-name" class="block text-xs font-medium text-slate-600 mb-1.5">
                    Project Name
                </label>
                <input id="project-name"
                       type="text"
                       x-model="projectName"
                       required
                       class="w-full border border-slate-200 rounded-lg px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-400 transition-all placeholder:text-slate-400"
                       placeholder="Enter project name">
                <div class="flex justify-end gap-3 mt-5">
                    <button type="button"
                            @click="showModal = false"
                            class="px-4 py-2 text-sm font-medium text-slate-500 hover:text-slate-700 transition-colors">
                        Cancel
                    </button>
                    <button type="submit"
                            class="px-5 py-2 text-sm font-medium bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 shadow-sm hover:shadow transition-all">
                        Create Project
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
