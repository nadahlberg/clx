{% extends "base.html" %}

{% block content %}
<div class="flex-1 overflow-y-auto p-8" x-data="{ showModal: false, projectName: '' }">
    <div class="max-w-6xl mx-auto">
        <div class="border-b border-border pb-6 mb-8">
            <h1 class="text-2xl font-semibold text-gray-900">Projects</h1>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            {% for project in projects %}
            <a href="/projects/{{ project.id }}/"
               class="block bg-white rounded-lg border border-border hover:border-gray-300 transition-colors p-6">
                <h2 class="text-lg font-medium text-gray-800">{{ project.name }}</h2>
            </a>
            {% endfor %}

            <!-- New Project Card -->
            <button @click="showModal = true"
                    class="flex items-center justify-center bg-white rounded-lg border border-dashed border-gray-300 p-6 text-gray-500 hover:text-gray-600 hover:border-gray-400 transition-colors cursor-pointer">
                <div class="text-center">
                    <i class="fas fa-plus text-2xl mb-2"></i>
                    <p class="text-base font-medium">New Project</p>
                </div>
            </button>
        </div>
    </div>

    <!-- New Project Modal -->
    <div x-show="showModal" x-cloak
         class="fixed inset-0 z-50 flex items-center justify-center bg-black/50"
         @keydown.escape.window="showModal = false">
        <div class="bg-white rounded-xl border border-border p-6 w-full max-w-md"
             @click.outside="showModal = false">
            <h2 class="text-lg font-semibold text-gray-800 mb-4">Create New Project</h2>
            <form @submit.prevent="
                fetch('/api/projects/', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name: projectName})
                }).then(r => {
                    if (!r.ok) throw new Error('Failed to create project');
                    window.location.reload();
                }).catch(e => alert(e.message))
            ">
                <label for="project-name" class="block text-sm font-medium text-gray-700 mb-1">
                    Project Name
                </label>
                <input id="project-name"
                       type="text"
                       x-model="projectName"
                       required
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                       placeholder="Enter project name">
                <div class="flex justify-end gap-3">
                    <button type="button"
                            @click="showModal = false"
                            class="px-4 py-2 text-sm text-gray-500 hover:text-gray-700">
                        Cancel
                    </button>
                    <button type="submit"
                            class="px-4 py-2 text-sm bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                        Create
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
